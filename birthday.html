<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <style>
        /* General Styles */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #ffe4e1; /* Light pink background */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .hidden {
            display: none !important;
        }

        h1 { color: #ff4d6d; margin-bottom: 10px; }
        p { color: #555; line-height: 1.6; }

        button {
            background: #ff4d6d;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            margin-top: 20px;
        }

        button:hover {
            background: #ff758f;
            transform: scale(1.05);
        }

        /* Page 2 Styles */
        .profile-pic {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #ff4d6d;
            margin-bottom: 15px;
        }

        /* Page 3 Styles */
        .btn-group {
            margin-top: 30px;
            position: relative;
            width: 100%;
            height: 100px;
        }

        #noBtn {
            position: absolute;
            transition: 0.1s;
        }

        #yesBtn {
            position: absolute;
            left: 20%;
        }

        #finalMessage {
            color: #ff4d6d;
            font-weight: bold;
            font-size: 1.5rem;
        }
    </style>
</head>
<body>

    <!-- PAGE 1: START -->
    <div id="page1" class="container">
        <h1>Hey You! 🎂</h1>
        <p>I have a special surprise for you...</p>
        <button onclick="nextPage(1, 2)">Click to Start</button>
    </div>

    <!-- PAGE 2: WISHES -->
    <div id="page2" class="container hidden">
        <!-- Replace this URL with your actual picture -->
        <img src="https://via.placeholder.com/150" alt="Birthday Person" class="profile-pic">
        <h1 id="name">Happy Birthday, [Name]!</h1>
        <p id="wishes">Wishing you a day filled with love, laughter, and all your favorite things. You deserve the world!</p>
        <button onclick="nextPage(2, 3)">Next ❤️</button>
    </div>

    <!-- PAGE 3: THE QUESTION -->
    <div id="page3" class="container hidden">
        <h1 id="questionText">Do you love me? 🥺</h1>
        <div class="btn-group">
            <button id="yesBtn" onclick="celebrate()">Yes!</button>
            <button id="noBtn" onmouseover="moveButton()">No</button>
        </div>
    </div>

    <script>
        // Function to switch between pages
        function nextPage(current, next) {
            document.getElementById('page' + current).classList.add('hidden');
            document.getElementById('page' + next).classList.remove('hidden');
        }

        // Function to move the "No" button
        function moveButton() {
            const noBtn = document.getElementById('noBtn');
            
            // Calculate random positions within the container
            // We subtract button width/height to keep it inside the screen
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);

            noBtn.style.position = "fixed"; // Move relative to screen
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        // Final action when "Yes" is clicked
        function celebrate() {
            const container = document.getElementById('page3');
            container.innerHTML = `
                <h1 style="font-size: 50px;">❤️</h1>
                <div id="finalMessage">I Knew It! I Love You Too! 💖</div>
                <p>Let's celebrate your best birthday yet!</p>
            `;
            
            // Basic confetti effect alert
            alert("Yay! Happy Birthday! 🎉");
        }
    </script>
</body>
</html>
