<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #ffe4e1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 450px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .hidden { display: none !important; }

        h1 { color: #ff4d6d; margin-bottom: 10px; }
        p { color: #555; line-height: 1.6; }

        button {
            background: #ff4d6d;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            margin-top: 20px;
            z-index: 10;
        }

        button:hover {
            background: #ff758f;
            transform: scale(1.05);
        }

        .profile-pic, .slideshow-img {
            width: 250px;
            height: 250px;
            border-radius: 15px;
            object-fit: cover;
            border: 5px solid #ff4d6d;
            margin-bottom: 15px;
        }

        .slideshow-container {
            position: relative;
            width: 250px;
            height: 250px;
            margin-bottom: 15px;
        }

        .fade { animation: fadeAnim 1.5s; }
        @keyframes fadeAnim { from {opacity: .4} to {opacity: 1} }

        .btn-group {
            margin-top: 30px;
            position: relative;
            width: 100%;
            height: 100px;
        }

        #noBtn { position: absolute; transition: 0.1s; left: 60%; }
        #yesBtn { position: absolute; left: 20%; }

        /* Mute Button in corner */
        #muteBtn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 77, 109, 0.3);
            padding: 10px;
            border-radius: 50%;
            font-size: 12px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <!-- BACKGROUND AUDIO -->
    <!-- Replace 'music.mp3' with your actual file link -->
    <audio id="myAudio" loop>
        <source src="music.mp3" type="audio/mpeg"></source>
        Your browser does not support the audio element.
    </audio>

    <button id="muteBtn" class="hidden" onclick="toggleMute()">🔊</button>

    <!-- PAGE 1: START -->
    <div id="page1" class="container">
        <h1>Hey You! 🎂</h1>
        <p>I have a surprise for you. Please turn on your sound!</p>
        <button onclick="startExperience()">Click to Start</button>
    </div>

    <!-- PAGE 2: WISHES -->
    <div id="page2" class="container hidden">
        <img src="https://images.unsplash.com/photo-1530103043960-ef38714abb15?w=400" alt="Birthday" class="profile-pic">
        <h1>Happy Birthday, [Name]!</h1>
        <p>You make every day feel like a celebration. May this year be your best one yet!</p>
        <button onclick="nextPage(2, 3); startSlideshow()">Our Memories ❤️</button>
    </div>

    <!-- PAGE 3: SLIDESHOW -->
    <div id="page3" class="container hidden">
        <h1>Moments with You...</h1>
        <div class="slideshow-container">
            <!-- Replace these with your photo URLs -->
            <img class="slideshow-img fade" src="https://images.unsplash.com/photo-1513151233558-d860c5398176?w=400" style="display:block">
            <img class="slideshow-img fade" src="https://images.unsplash.com/photo-1464349172904-164bb213702a?w=400" style="display:none">
            <img class="slideshow-img fade" src="https://images.unsplash.com/photo-1514525253361-bee8a48740d7?w=400" style="display:none">
        </div>
        <p>Just a few of my favorite memories.</p>
        <button onclick="nextPage(3, 4)">One last thing...</button>
    </div>

    <!-- PAGE 4: THE QUESTION -->
    <div id="page4" class="container hidden">
        <h1 id="questionText">Do you love me? 🥺</h1>
        <div class="btn-group">
            <button id="yesBtn" onclick="celebrate()">Yes!</button>
            <button id="noBtn" onmouseover="moveButton()">No</button>
        </div>
    </div>

    <script>
        const audio = document.getElementById("myAudio");

        // Start everything and play music
        function startExperience() {
            audio.play().catch(error => console.log("Audio play failed:", error));
            document.getElementById('muteBtn').classList.remove('hidden');
            nextPage(1, 2);
        }

        // Navigation
        function nextPage(current, next) {
            document.getElementById('page' + current).classList.add('hidden');
            document.getElementById('page' + next).classList.remove('hidden');
        }

        // Slideshow Logic
        let slideIndex = 0;
        function startSlideshow() {
            const slides = document.getElementsByClassName("slideshow-img");
            for (let i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";  
            }
            slideIndex++;
            if (slideIndex > slides.length) {slideIndex = 1}    
            slides[slideIndex-1].style.display = "block";  
            setTimeout(startSlideshow, 2500);
        }

        // Runaway Button
        function moveButton() {
            const noBtn = document.getElementById('noBtn');
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            noBtn.style.position = "fixed";
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        // Mute Toggle
        function toggleMute() {
            const btn = document.getElementById('muteBtn');
            if (audio.muted) {
                audio.muted = false;
                btn.innerHTML = "🔊";
            } else {
                audio.muted = true;
                btn.innerHTML = "🔇";
            }
        }

        // Final Celebration
        function celebrate() {
            const container = document.getElementById('page4');
            container.innerHTML = `
                <h1 style="font-size: 50px;">💖</h1>
                <h1>Yay! I Love You Too!</h1>
                <p>Happy Birthday! Hope you liked your surprise!</p>
            `;
            alert("Best Birthday Ever! 🎉");
        }
    </script>
</body>
</html>
